<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2em;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 200px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .button-group {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1>支付成功！</h1>
        <p>感谢您的购买。您现在可以访问相应的应用和服务了。</p>
        <p style="font-size: 0.9em;">订单确认邮件已发送到您的邮箱。</p>
        
        <div class="button-group">
            <button class="btn btn-primary" onclick="window.close()">关闭</button>
        </div>
    </div>

    <script>
        // 从 URL 获取 session_id
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        
        // 🚀 支付成功后立即同步订阅数据（不依赖 webhook）
        if (sessionId) {
            console.log('Payment successful, session ID:', sessionId);
            
            // 调用同步接口
            fetch('http://localhost:8787/api/sync-session', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ sessionId })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Subscription synced:', data);
                if (data.success) {
                    console.log('✅ 订阅数据已同步');
                }
            })
            .catch(error => {
                console.error('Failed to sync subscription:', error);
            });
        }

        // 智能关闭窗口
        function closeWindow() {
            // 尝试关闭窗口
            window.close();
            
            // 如果窗口没有关闭（某些浏览器限制），延迟后返回上一页
            setTimeout(() => {
                if (!window.closed) {
                    // 窗口仍然打开，返回到 admin 页面
                    window.location.href = 'admin.html';
                }
            }, 100);
        }

        // 重写按钮的 onclick
        window.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.querySelector('.btn-primary');
            if (closeBtn) {
                closeBtn.onclick = closeWindow;
            }
        });
    </script>
</body>
</html>
