[pytest]
# pytest配置文件

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    unit: 单元测试（快速，使用mock）
    integration: 集成测试（慢速，需要真实API）
    smoke: 冒烟测试（核心功能）
    apps: 应用管理相关测试
    plans: 订阅计划相关测试
    purchase: 购买相关测试
    access: 权限验证相关测试
    admin: 管理员API测试

# 测试输出配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    --durations=10
    
# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True

